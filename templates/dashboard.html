{% extends "base.html" %}

{% block content %}


 <div class="container">
    <div class="column">
        <div class="card">
            <div class="card-header" id="search-box"
                hx-get="/partials/weather-load?city_state={{last_weather_location}}"
                hx-trigger="load"
                hx-target="#weather-result"
                hx-swap="innerHTML">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
                    viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="11" r="3"/>
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                </svg>
				<form id="address-form"
					hx-post="/partials/getWeatherForAddress"
					hx-target="#weather-result"
					hx-swap="innerHTML"
                    hx-include="[name=city_state]"
					hx-indicator="#spinner">
					<div class="form-fields">
						<div class="field city-search-field">

							<label for="city_state">Location:</label>

							<div class="input-wrap">
								<input type="text"
									name="city_state"
									id="city_state"
									placeholder="{{last_weather_location}}"
									autocomplete="off" />
                                <input type="hidden" id="timezone" name="timezone" value="" />
								<ul class="recent-dropdown" id="recent-dropdown" hidden role="listbox"></ul>
							</div>
                            <button type="submit">
								<i class="ti ti-cloud-search" aria-hidden="true"></i>
							</button>
							<span id="spinner" class="htmx-indicator">Loading…</span>

						</div>
					</div>

				</form>
            </div>  <!-- Card Header  -->
            <div class="card-body" id="weather-result">
                
            </div> <!-- Card Body -->
        </div> <!-- Card -->
	</div> <!-- column -->
</div>
<div class="container">
    <div class="column">
        <div class="card">
            <div class="card-header">   
                <div><h3 class="card-label">Book Summary Page</h3></div>
            </div>  <!-- Card Header -->
            <div class="card-body">
                <ul>
                    <li>book 1</li>
                    <li>book 2</li>
                    <li>book 3</li>
                </ul>
            </div>  <!-- Card Body -->
        </div> <!-- Card -->
    </div> <!-- Column -->
    <div class="column">
        <div class="card">
            <div class="card-header">   
                <div><h3 class="card-label">Travel Summary Page</h3></div>
            </div>  <!-- Card Header -->
            <div class="card-body">
                <ul>
                    <li>travel 1</li>
                    <li>travel 2</li>
                    <li>travel 3</li>
                </ul>
            </div> <!-- Card Body -->
        </div> <!-- Card -->
    </div> <!-- Column -->  
</div> <!-- Container -->

{% endblock %}
