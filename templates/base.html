<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <!--<link rel="stylesheet" href="/static/css/styles.css"> -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link href="{{ url_for('static', path='css/styles.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', path='css/weather-icons.min.css') }}" rel="stylesheet">
</head>
<body>
    <header class="site-header">

  <div class="header-inner">

    <!-- Brand: image + title — clicking goes to dashboard -->
    <a href="/" class="brand" aria-label="Home">
      <div class="brand-avatar">
        <img src="/static/images/mt-hood-small.jpg"
             alt="Profile photo"
             onerror="this.style.display='none'; this.parentNode.textContent='✦';" />
      </div>
      <span class="brand-name">
        {{ title }}
      </span>
    </a>

    <nav id="nav-drawer"
         class="nav-drawer"
         aria-label="Main navigation">
      <ul>
        <li>
          <a href="/weather"
             class="{{ 'active' if active_page == 'weather' else '' }}"
             hx-get="/weather"
             hx-target="#main-content"
             hx-push-url="true">Weather</a>
        </li>
        <li>
          <a href="/books"
             class="{{ 'active' if active_page == 'books' else '' }}"
             hx-get="/books"
             hx-target="#main-content"
             hx-push-url="true">Books</a>
        </li>
        <li>
          <a href="/travel"
             class="{{ 'active' if active_page == 'travel' else '' }}"
             hx-get="/travel"
             hx-target="#main-content"
             hx-push-url="true">Travel</a>
        </li>
      </ul>
    </nav>


    <!-- Hamburger (mobile only — triggers the dropdown) -->
    <button class="nav-toggle"
            id="nav-toggle"
            aria-controls="nav-drawer"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

  </div><!-- /.header-inner -->

</header>

<!-- Main content target for HTMX swaps -->
<main id="main-content">
  {% block content %}{% endblock %}
</main>
<script>
  document.getElementById("timezone").value = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const toggle = document.getElementById('nav-toggle');
  const drawer = document.getElementById('nav-drawer');

  toggle.addEventListener('click', () => {
    const isOpen = drawer.classList.toggle('is-open');
    toggle.setAttribute('aria-expanded', isOpen);
  });

  // Close when a nav link is clicked
  drawer.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      drawer.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    });
  });

  // Close when clicking outside the header
  document.addEventListener('click', e => {
    if (!e.target.closest('.site-header')) {
      drawer.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && drawer.classList.contains('is-open')) {
      drawer.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
      toggle.focus();
    }
  });
</script>
</body>
</html>
