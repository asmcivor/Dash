<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <!--<link rel="stylesheet" href="/static/css/styles.css"> -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link href="{{ url_for('static', path='css/styles.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', path='css/weather-icons.min.css') }}" rel="stylesheet">
</head>
<body>
    <header class="site-header">

  <div class="header-inner">

    <!-- Brand: image + title — clicking goes to dashboard -->
    <a href="/" class="brand" aria-label="Home">
      <div class="brand-avatar">
        <img src="/static/images/mt-hood-small.jpg"
             alt="Profile photo"
             onerror="this.style.display='none'; this.parentNode.textContent='✦';" />
      </div>
      <span class="brand-name">
        {{ title }}
      </span>
    </a>

    <nav id="nav-drawer"
         class="nav-drawer"
         aria-label="Main navigation">
      <ul>
        <li>
          <a href="/weather"
             class="{{ 'active' if active_page == 'weather' else '' }}"
             hx-get="/weather"
             hx-target="#main-content"
             hx-push-url="true">Weather</a>
        </li>
        <li>
          <a href="/books"
             class="{{ 'active' if active_page == 'books' else '' }}"
             hx-get="/books"
             hx-target="#main-content"
             hx-push-url="true">Books</a>
        </li>
        <li>
          <a href="/travel"
             class="{{ 'active' if active_page == 'travel' else '' }}"
             hx-get="/travel"
             hx-target="#main-content"
             hx-push-url="true">Travel</a>
        </li>
      </ul>
    </nav>


    <!-- Hamburger (mobile only — triggers the dropdown) -->
    <button class="nav-toggle"
            id="nav-toggle"
            aria-controls="nav-drawer"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

  </div><!-- /.header-inner -->

</header>

<!-- Main content target for HTMX swaps -->
<main id="main-content">
  {% block content %}{% endblock %}
</main>
<script>
  document.getElementById("timezone").value = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const toggle = document.getElementById('nav-toggle');
  const drawer = document.getElementById('nav-drawer');

  toggle.addEventListener('click', () => {
    const isOpen = drawer.classList.toggle('is-open');
    toggle.setAttribute('aria-expanded', isOpen);
  });

  // Close when a nav link is clicked
  drawer.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      drawer.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    });
  });

  // Close when clicking outside the header
  document.addEventListener('click', e => {
    if (!e.target.closest('.site-header')) {
      drawer.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && drawer.classList.contains('is-open')) {
      drawer.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
      toggle.focus();
    }
  });
  // 
  (function () {
    const COOKIE_KEY = "recent_city_searches";

    // --- Cookie helper ---
    function getCookieList(key) {
        const match = document.cookie.split("; ").find(r => r.startsWith(key + "="));
        if (!match) return [];
        try {
            return JSON.parse(decodeURIComponent(match.split("=").slice(1).join("=")));
        } catch {
            return [];
        }
    }

    // --- Dropdown logic ---
    const input = document.getElementById("city_state");
    const dropdown = document.getElementById("recent-dropdown");

    if (!input || !dropdown) return;

    let activeIndex = -1;

    function showDropdown(items) {
        dropdown.innerHTML = "";
        activeIndex = -1;

        if (items.length === 0) {
            dropdown.hidden = true;
            return;
        }

        items.forEach((city, i) => {
            const li = document.createElement("li");
            li.textContent = city;
            li.setAttribute("role", "option");
            li.setAttribute("id", `recent-option-${i}`);
            li.addEventListener("mousedown", (e) => {
                e.preventDefault(); // prevent blur firing before click
                selectCity(city);
            });
            dropdown.appendChild(li);
        });

        dropdown.hidden = false;
    }

    function hideDropdown() {
        dropdown.hidden = true;
        activeIndex = -1;
    }

    function selectCity(city) {
        input.value = city;
        hideDropdown();
        document.getElementById("address-form").dispatchEvent(new Event("submit", { bubbles: true }));
    }

    function updateActive() {
        [...dropdown.querySelectorAll("li")].forEach((li, i) => {
            li.setAttribute("aria-selected", i === activeIndex);
        });
    }

    // Show all recents on focus
    input.addEventListener("focus", () => {
        showDropdown(getCookieList(COOKIE_KEY));
    });

    // Filter as user types
    input.addEventListener("input", () => {
        const query = input.value.trim().toLowerCase();
        const recents = getCookieList(COOKIE_KEY);
        const filtered = query
            ? recents.filter(c => c.toLowerCase().includes(query))
            : recents;
        showDropdown(filtered);
    });

    // Keyboard navigation
    input.addEventListener("keydown", (e) => {
        const items = [...dropdown.querySelectorAll("li")];
        if (e.key === "ArrowDown") {
            e.preventDefault();
            activeIndex = Math.min(activeIndex + 1, items.length - 1);
            updateActive();
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            activeIndex = Math.max(activeIndex - 1, 0);
            updateActive();
        } else if (e.key === "Enter" && activeIndex >= 0) {
            e.preventDefault();
            selectCity(items[activeIndex].textContent);
        } else if (e.key === "Escape") {
            hideDropdown();
        }
    });

    // Hide on blur
    input.addEventListener("blur", hideDropdown);
})();
</script>
</body>
</html>
